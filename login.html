<!DOCTYPE html>
<html>

<head>

<title>ExamEdge Login</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

</head>

<body>

<div id="particles-js"></div>

<div class="container">

<!-- LEFT SIDE -->

<div class="left">

<h1 class="logo">ExamEdge</h1>

<p class="subtitle">
Your Smart Practice Platform for Aptitude & Competitive Exams
</p>

<h3 class="typing"></h3>

<p class="quote">
"Practice like you've never won. Perform like you've never lost."
</p>

<div class="features">

<div class="feature">
<i class="fa fa-clock"></i>
<span>Timed Mock Tests</span>
</div>

<div class="feature">
<i class="fa fa-list"></i>
<span>Question Navigation Panel</span>
</div>

<div class="feature">
<i class="fa fa-chart-line"></i>
<span>Instant Result Analysis</span>
</div>

<div class="feature">
<i class="fa fa-trophy"></i>
<span>Leaderboard Ranking</span>
</div>

</div>

</div>


<!-- LOGIN CARD -->

<div class="login-card">

<h2>Login to Start Test</h2>

<div class="input-box">
<i class="fa fa-user"></i>
<input type="text" placeholder="Username">
</div>

<div class="input-box">
<i class="fa fa-lock"></i>
<input type="password" placeholder="Password">
</div>

<button onclick="login()">Start Mock Test</button>

<p class="signup">
Don't have an account?
<a href="signup.html">Signup</a>
</p>

</div>

</div>


<script src="script.js"></script>

</body>
</html>
