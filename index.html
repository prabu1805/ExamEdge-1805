<!DOCTYPE html>
<html>
<head>
<title>ExamEdge</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>ExamEdge</h1>
<button id="startBtn">Start Test</button>
</header>

<div class="exam-container hidden" id="quizBox">

<div class="top-bar">
⏱ Time Left : <span id="time">05:00</span>
</div>

<div class="exam-body">

<div class="palette-panel">
<h3>Questions</h3>
<div id="paletteBox"></div>
</div>

<div class="question-panel">

<h2 id="question"></h2>

<div class="options">
<button class="option"></button>
<button class="option"></button>
<button class="option"></button>
<button class="option"></button>
</div>

</div>

</div>

<div class="bottom-bar">

<button id="reviewBtn">Mark for Review</button>

<button id="prevBtn">Previous</button>

<button id="nextBtn">Save & Next</button>

</div>

</div>
<div id="leaderboardBox">

<h2>🏆 Leaderboard</h2>

<table>

<tr>
<th>Rank</th>
<th>Name</th>
<th>Score</th>
</tr>

<tbody id="leaderboardList"></tbody>

</table>

</div>

<script src="questions.js"></script>
<script src="script.js"></script>

</body>
</html>
